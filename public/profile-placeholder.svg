<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- Body -->
  <ellipse cx="200" cy="380" rx="100" ry="60" fill="#1e40af"/>
  <!-- Neck -->
  <rect x="180" y="260" width="40" height="30" rx="5" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="200" cy="200" rx="80" ry="90" fill="url(#skin)"/>
  <!-- Hair -->
  <ellipse cx="200" cy="150" rx="85" ry="60" fill="#1e293b"/>
  <rect x="115" y="150" width="170" height="30" rx="10" fill="#1e293b"/>
  <!-- Eyes -->
  <ellipse cx="170" cy="210" rx="10" ry="12" fill="white"/>
  <ellipse cx="230" cy="210" rx="10" ry="12" fill="white"/>
  <circle cx="172" cy="212" r="5" fill="#1e293b"/>
  <circle cx="232" cy="212" r="5" fill="#1e293b"/>
  <!-- Smile -->
  <path d="M 175 240 Q 200 260 225 240" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="170" cy="210" r="22" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="230" cy="210" r="22" fill="none" stroke="#334155" stroke-width="3"/>
  <line x1="192" y1="210" x2="208" y2="210" stroke="#334155" stroke-width="3"/>
</svg>
